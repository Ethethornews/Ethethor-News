<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Ethethor News</title>
  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f4f4f4;
    }

    header {
      background: #111;
      color: white;
      padding: 20px;
      text-align: center;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    .form {
      background: white;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 20px;
    }

    input, textarea {
      width: 100%;
      margin: 5px 0;
      padding: 10px;
    }

    button {
      padding: 10px;
      background: black;
      color: white;
      border: none;
      cursor: pointer;
    }

    .news {
      background: white;
      padding: 15px;
      margin-bottom: 10px;
      border-radius: 10px;
    }

    .tag {
      font-size: 12px;
      background: red;
      color: white;
      padding: 3px 7px;
      border-radius: 5px;
    }
  </style>
</head>

<body>

<header>
  <h1>Ethethor News</h1>
  <p>Canlı Haber Sistemi</p>
</header>

<div class="container">

  <div class="form">
    <h3>Haber Ekle</h3>
    <input id="title" placeholder="Başlık">
    <input id="category" placeholder="Kategori (Dünya, Spor, Teknoloji)">
    <textarea id="content" placeholder="Haber içeriği"></textarea>
    <button onclick="addNews()">Yayınla</button>
  </div>

  <div id="newsList"></div>

</div>

<script>
function addNews() {
  const title = document.getElementById("title").value;
  const category = document.getElementById("category").value;
  const content = document.getElementById("content").value;

  if (!title || !content) return alert("Boş bırakma!");

  const news = JSON.parse(localStorage.getItem("news") || "[]");

  news.unshift({ title, category, content });

  localStorage.setItem("news", JSON.stringify(news));

  loadNews();
}

function loadNews() {
  const list = document.getElementById("newsList");
  const news = JSON.parse(localStorage.getItem("news") || "[]");

  list.innerHTML = "";

  news.forEach(n => {
    const div = document.createElement("div");
    div.className = "news";

    div.innerHTML = `
      <span class="tag">${n.category}</span>
      <h3>${n.title}</h3>
      <p>${n.content}</p>
    `;

    list.appendChild(div);
  });
}

loadNews();
</script>

</body>
</html>
