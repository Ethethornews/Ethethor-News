<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="google-site-verification" content="7e6535c307aab2">
  <meta name="description" content="Ethethor News - Son dakika haberler">
  <meta name="robots" content="index, follow">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Ethethor News</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f4f4f4;
    }

    header {
      background: #111;
      color: white;
      text-align: center;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    .panel,
    .news {
      background: white;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 20px;
    }

    input,
    textarea,
    select {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      box-sizing: border-box;
    }

    button {
      padding: 10px 20px;
      margin-top: 10px;
      background: black;
      color: white;
      border: none;
      cursor: pointer;
    }

    .manset {
      border-left: 6px solid red;
    }

    .alt {
      border-left: 6px solid orange;
    }

    .normal {
      border-left: 6px solid blue;
    }
  </style>
</head>

<body>

<header>
  <h1>Ethethor News</h1>
  <p>Profesyonel Haber Sistemi</p>
</header>

<div class="container">

  <div class="news manset">
    <h2>Manşet Haber</h2>
    <p>Ethethor News yayına başladı.</p>
  </div>

  <div class="panel">
    <h2>Haber Ekle</h2>

    <input type="text" id="title" placeholder="Başlık">

    <textarea id="content" placeholder="Haber içeriği"></textarea>

    <select id="type">
      <option value="manset">Manşet</option>
      <option value="alt">Alt Manşet</option>
      <option value="normal">Normal Haber</option>
    </select>

    <button onclick="addNews()">Yayınla</button>
  </div>

  <div id="mansetArea"></div>
  <div id="altArea"></div>
  <div id="normalArea"></div>

</div>

<script>

function addNews() {

  const title = document.getElementById("title").value;
  const content = document.getElementById("content").value;
  const type = document.getElementById("type").value;

  if (!title || !content) {
    alert("Boş bırakma!");
    return;
  }

  let news = [];

  try {
    news = JSON.parse(localStorage.getItem("news")) || [];
  } catch(e) {
    news = [];
  }

  news.unshift({
    title,
    content,
    type
  });

  localStorage.setItem("news", JSON.stringify(news));

  loadNews();
}

function loadNews() {

  let news = [];

  try {
    news = JSON.parse(localStorage.getItem("news")) || [];
  } catch(e) {
    news = [];
  }

  const mansetArea = document.getElementById("mansetArea");
  const altArea = document.getElementById("altArea");
  const normalArea = document.getElementById("normalArea");

  mansetArea.innerHTML = "";
  altArea.innerHTML = "";
  normalArea.innerHTML = "";

  news.forEach(n => {

    const div = document.createElement("div");

    div.classList.add("news");
    div.classList.add(n.type);

    div.innerHTML = `
      <h2>${n.title}</h2>
      <p>${n.content}</p>
    `;

    if (n.type === "manset") {
      mansetArea.appendChild(div);
    }

    else if (n.type === "alt") {
      altArea.appendChild(div);
    }

    else {
      normalArea.appendChild(div);
    }

  });

}

loadNews();

</script>

</body>
</html>
