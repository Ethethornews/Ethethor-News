</head>
<meta charset="UTF-8">
<title>Ethethor News</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f4f4f4;
}

header {
  background: #111;
  color: white;
  padding: 20px;
  text-align: center;
}

.container {
  max-width: 1000px;
  margin: auto;
  padding: 20px;
}

/* PANEL */
.panel {
  background: white;
  padding: 15px;
  margin-bottom: 20px;
  border-radius: 10px;
}

input, textarea, select {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
}

button {
  padding: 10px;
  background: black;
  color: white;
  border: none;
  cursor: pointer;
}

/* HABER BLOKLARI */
.news {
  background: white;
  padding: 15px;
  margin-bottom: 10px;
  border-radius: 10px;
}

.manset { border-left: 6px solid red; }
.alt { border-left: 6px solid orange; }
.normal { border-left: 6px solid blue; }

.tag {
  font-size: 12px;
  padding: 3px 7px;
  color: white;
  border-radius: 5px;
}

.red { background: red; }
.orange { background: orange; }
.blue { background: blue; }

</style>
</head>

<body>

<header>
<h1>Ethethor News</h1>
<p>Profesyonel Haber Sistemi</p>
</header>

<div class="container">

<!-- PANEL -->
<div class="panel">
<h2>Haber Ekle</h2>

<input id="title" placeholder="Başlık">
<textarea id="content" placeholder="Haber içeriği"></textarea>

<select id="type">
  <option value="manset">Manşet</option>
  <option value="alt">Alt Manşet</option>
  <option value="normal">Normal</option>
</select>

<button onclick="addNews()">Yayınla</button>
</div>

<!-- HABERLER -->
<div id="mansetArea"></div>
<div id="altArea"></div>
<div id="normalArea"></div>

</div>

<script>

function addNews() {
  const title = document.getElementById("title").value;
  const content = document.getElementById("content").value;
  const type = document.getElementById("type").value;

  if (!title || !content) {
    alert("Boş bırakma!");
    return;
  }

  let news = JSON.parse(localStorage.getItem("news") || "[]");

  news.unshift({ title, content, type });

  localStorage.setItem("news", JSON.stringify(news));

  loadNews();
}

function loadNews() {

  let news = JSON.parse(localStorage.getItem("news") || "[]");

  const mansetArea = document.getElementById("mansetArea");
  const altArea = document.getElementById("altArea");
  const normalArea = document.getElementById("normalArea");

  mansetArea.innerHTML = "";
  altArea.innerHTML = "";
  normalArea.innerHTML = "";

  news.forEach(n => {

    let div = document.createElement("div");

    if (n.type === "manset") {
      div.className = "news manset";
      div.innerHTML = `<span class="tag red">MANŞET</span><h2>${n.title}</h2><p>${n.content}</p>`;
      mansetArea.appendChild(div);
    }

    else if (n.type === "alt") {
      div.className = "news alt";
      div.innerHTML = `<span class="tag orange">ALT MANŞET</span><h3>${n.title}</h3><p>${n.content}</p>`;
      altArea.appendChild(div);
    }

    else {
      div.className = "news normal";
      div.innerHTML = `<span class="tag blue">HABER</span><h4>${n.title}</h4><p>${n.content}</p>`;
      normalArea.appendChild(div);
    }

  });
}

loadNews();

</script>

</body>
</html>
