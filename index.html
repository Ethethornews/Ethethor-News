<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ethethor News Panel</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f4f4f4;
}

header {
  background: #111;
  color: white;
  padding: 20px;
  text-align: center;
}

.container {
  max-width: 1000px;
  margin: auto;
  padding: 20px;
}

/* PANEL */
.panel {
  background: white;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 20px;
}

input, textarea, select {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
}

button {
  padding: 10px;
  background: black;
  color: white;
  border: none;
  cursor: pointer;
}

/* HABERLER */
.news {
  background: white;
  padding: 15px;
  margin-bottom: 10px;
  border-radius: 10px;
}

.manset {
  border-left: 6px solid red;
}

.alt-manset {
  border-left: 6px solid orange;
}

.standart {
  border-left: 6px solid blue;
}

.tag {
  font-size: 12px;
  padding: 3px 7px;
  color: white;
  border-radius: 5px;
  display: inline-block;
}

.red { background: red; }
.orange { background: orange; }
.blue { background: blue; }

</style>
</head>

<body>

<header>
<h1>Ethethor News</h1>
<p>Profesyonel Haber Panel Sistemi</p>
</header>

<div class="container">

<!-- PANEL -->
<div class="panel">
<h2>Haber Ekle</h2>

<input id="title" placeholder="Haber Başlığı">
<textarea id="content" placeholder="Haber İçeriği"></textarea>

<select id="type">
  <option value="manset">Manşet</option>
  <option value="alt">Alt Manşet</option>
  <option value="standart">Standart</option>
</select>

<button onclick="addNews()">Yayınla</button>
</div>

<!-- HABER LİSTESİ -->
<div id="newsList"></div>

</div>

<script>

function addNews() {
  const title = document.getElementById("title").value;
  const content = document.getElementById("content").value;
  const type = document.getElementById("type").value;

  if (!title || !content) return alert("Boş bırakma!");

  const news = JSON.parse(localStorage.getItem("news") || "[]");

  news.unshift({ title, content, type });

  localStorage.setItem("news", JSON.stringify(news));

  loadNews();
}

function loadNews() {
  const list = document.getElementById("newsList");
  const news = JSON.parse(localStorage.getItem("news") || "[]");

  list.innerHTML = "";

  news.forEach(n => {

    let className = "news standart";
    let tagClass = "blue";
    let tagText = "Standart";

    if (n.type === "manset") {
      className = "news manset";
      tagClass = "red";
      tagText = "Manşet";
    }

    if (n.type === "alt") {
      className = "news alt-manset";
      tagClass = "orange";
      tagText = "Alt Manşet";
    }

    const div = document.createElement("div");
    div.className = className;

    div.innerHTML = `
      <span class="tag ${tagClass}">${tagText}</span>
      <h3>${n.title}</h3>
      <p>${n.content}</p>
    `;

    list.appendChild(div);
  });
}

loadNews();

</script>

</body>
</html>
