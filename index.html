  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Arial}

    body{background:#eef1f5;color:#111}

    header{
      background:#0d0d0d;
      color:#fff;
      padding:18px;
      text-align:center;
      font-size:28px;
      font-weight:bold;
      border-bottom:4px solid red;
    }

    .breaking{
      background:red;
      color:#fff;
      padding:10px;
      font-weight:bold;
      white-space:nowrap;
      overflow:hidden;
    }

    .container{
      max-width:1200px;
      margin:20px auto;
      display:grid;
      grid-template-columns:2fr 1fr;
      gap:20px;
      padding:0 15px;
    }

    .main{
      background:#fff;
      border-radius:15px;
      padding:15px;
    }

    .main img{width:100%;border-radius:12px}

    .main h1{margin:15px 0}

    .right{
      background:#fff;
      border-radius:15px;
      padding:15px;
    }

    .mini{
      display:flex;
      gap:10px;
      margin-bottom:15px;
      border-bottom:1px solid #ddd;
      padding-bottom:10px;
    }

    .mini img{
      width:90px;
      height:60px;
      object-fit:cover;
      border-radius:8px;
    }

    .grid{
      max-width:1200px;
      margin:20px auto;
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
      gap:15px;
      padding:0 15px;
    }

    .card{
      background:#fff;
      border-radius:12px;
      overflow:hidden;
    }

    .card img{width:100%;height:180px;object-fit:cover}

    .card div{padding:10px}

    /* ADMIN */
    .adminBox{
      max-width:400px;
      margin:30px auto;
      background:#fff;
      padding:20px;
      border-radius:12px;
      text-align:center;
    }

    .adminPanel{
      display:none;
      max-width:900px;
      margin:20px auto;
      background:#fff;
      padding:15px;
      border-radius:12px;
    }

    input,textarea{
      width:100%;
      padding:10px;
      margin:8px 0;
    }

    button{
      padding:10px;
      background:black;
      color:#fff;
      border:none;
      cursor:pointer;
    }

  </style>

</head>

<body>

  </div>

<!-- NEWS GRID -->

<div class="grid" id="newsArea"></div>

<!-- ADMIN LOGIN -->

<div class="adminBox" id="loginBox">
  <h3>Admin Giriş</h3>
  <input type="password" id="pass" placeholder="Şifre">
  <button onclick="login()">Giriş</button>
</div>

<!-- ADMIN PANEL -->

<div class="adminPanel" id="adminPanel">
  <h3>Haber Ekle</h3>
  <input id="title" placeholder="Başlık">
  <input id="img" placeholder="Resim URL">
  <textarea id="content" placeholder="Haber içeriği"></textarea>
  <button onclick="addNews()">Ekle</button>
</div>

<script>

let password = "1234";

function login(){
  let p = document.getElementById("pass").value;
  if(p === password){
    document.getElementById("loginBox").style.display="none";
    document.getElementById("adminPanel").style.display="block";
  } else {
    alert("Hatalı şifre");
  }
}

function addNews(){
  let t = document.getElementById("title").value;
  let i = document.getElementById("img").value;
  let c = document.getElementById("content").value;

  let news = JSON.parse(localStorage.getItem("news")||"[]");

  news.unshift({t,i,c});

  localStorage.setItem("news",JSON.stringify(news));

  load();
}

function load(){

  let news = JSON.parse(localStorage.getItem("news")||"[]");

  let area = document.getElementById("newsArea");
  area.innerHTML="";

  news.forEach(n=>{
    area.innerHTML += `
      <div class="card">
        <img src="${n.i}">
        <div>
          <h3>${n.t}</h3>
          <p>${n.c}</p>
        </div>
      </div>
    `;
  });
}

load();

</script>

</body>
