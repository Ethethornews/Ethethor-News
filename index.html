<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ethethor News</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f5f5f5;
}

header {
  background: #0d0d0d;
  color: white;
  padding: 20px;
  text-align: center;
}

.container {
  max-width: 1100px;
  margin: auto;
  padding: 20px;
}

/* MANŞET */
.manset {
  background: white;
  padding: 20px;
  border-left: 6px solid red;
  margin-bottom: 20px;
}

/* ALT MANŞET */
.alt {
  background: white;
  padding: 15px;
  border-left: 6px solid orange;
  margin-bottom: 15px;
}

/* NORMAL HABER */
.news {
  background: white;
  padding: 15px;
  margin-bottom: 10px;
  border-left: 6px solid blue;
}

.tag {
  font-size: 12px;
  padding: 3px 8px;
  color: white;
  border-radius: 5px;
}

.red { background: red; }
.orange { background: orange; }
.blue { background: blue; }

/* PANEL */
.panel {
  background: white;
  padding: 15px;
  margin-bottom: 20px;
}

input, textarea, select {
  width: 100%;
  margin: 5px 0;
  padding: 10px;
}

button {
  padding: 10px;
  background: black;
  color: white;
  border: none;
  cursor: pointer;
}

</style>
</head>

<body>

<header>
<h1>Ethethor News</h1>
<p>Profesyonel Haber Platformu</p>
</header>

<div class="container">

<!-- ADMIN PANEL -->
<div class="panel">
<h2>Haber Paneli</h2>

<input id="title" placeholder="Başlık">
<textarea id="content" placeholder="Haber içeriği"></textarea>

<select id="type">
  <option value="manset">Manşet</option>
  <option value="alt">Alt Manşet</option>
  <option value="normal">Normal</option>
</select>

<button onclick="addNews()">Yayınla</button>
</div>

<!-- HABERLER -->
<div id="mansetArea"></div>
<div id="altArea"></div>
<div id="newsArea"></div>

</div>

<script>

function addNews() {
  const title = document.getElementById("title").value;
  const content = document.getElementById("content").value;
  const type = document.getElementById("type").value;

  const data = JSON.parse(localStorage.getItem("news") || "[]");

  data.unshift({ title, content, type });

  localStorage.setItem("news", JSON.stringify(data));

  loadNews();
}

function loadNews() {
  const mansetArea = document.getElementById("mansetArea");
  const altArea = document.getElementById("altArea");
  const newsArea = document.getElementById("newsArea");

  const data = JSON.parse(localStorage.getItem("news") || "[]");

  mansetArea.innerHTML = "";
  altArea.innerHTML = "";
  newsArea.innerHTML = "";

  data.forEach(n => {

    const div = document.createElement("div");

    if (n.type === "manset") {
      div.className = "manset";
      div.innerHTML = `<span class="tag red">MANŞET</span><h2>${n.title}</h2><p>${n.content}</p>`;
      mansetArea.appendChild(div);
    }

    else if (n.type === "alt") {
      div.className = "alt";
      div.innerHTML = `<span class="tag orange">ALT MANŞET</span><h3>${n.title}</h3><p>${n.content}</p>`;
      altArea.appendChild(div);
    }

    else {
      div.className = "news";
      div.innerHTML = `<span class="tag blue">HABER</span><h4>${n.title}</h4><p>${n.content}</p>`;
      newsArea.appendChild(div);
    }

  });
}

loadNews();

</script>

</body>
</html>
