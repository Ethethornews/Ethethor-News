<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial;
    }

    body{
      background:#101010;
      color:white;
    }

    /* ÜST BAR */

    .topbar{
      background:#0b0b0b;
      border-bottom:3px solid red;
      padding:18px;
      text-align:center;
      font-size:22px;
      font-weight:bold;
      letter-spacing:1px;
    }

    /* LOGIN */

    .login-box{
      width:350px;
      margin:80px auto;
      background:#1a1a1a;
      padding:25px;
      border-radius:12px;
      text-align:center;
      box-shadow:0 0 15px rgba(0,0,0,0.4);
    }

    .login-box h2{
      margin-bottom:20px;
    }

    input, textarea, select{
      width:100%;
      padding:12px;
      margin-top:12px;
      border:none;
      border-radius:8px;
      background:#2a2a2a;
      color:white;
      font-size:14px;
    }

    textarea{
      height:140px;
      resize:none;
    }

    button{
      width:100%;
      padding:12px;
      margin-top:15px;
      background:red;
      color:white;
      border:none;
      border-radius:8px;
      cursor:pointer;
      font-size:15px;
      font-weight:bold;
    }

    button:hover{
      opacity:0.9;
    }

    /* PANEL */

    .panel{
      display:none;
      max-width:800px;
      margin:40px auto;
      background:#1a1a1a;
      padding:25px;
      border-radius:12px;
      box-shadow:0 0 15px rgba(0,0,0,0.4);
    }

    .panel h2{
      margin-bottom:20px;
    }

    .info{
      margin-top:15px;
      color:#aaa;
      font-size:13px;
    }

  </style>
</head>

<body>

<div class="topbar">
  ETETHOR NEWS ADMIN PANEL
</div>

<!-- LOGIN -->

<div class="login-box" id="loginBox">

  <h2>Yönetici Girişi</h2>

  <input type="password" id="password" placeholder="Şifre">

  <button onclick="login()">Giriş Yap</button>

</div>

<!-- PANEL -->

<div class="panel" id="panel">

  <h2>Haber Ekle</h2>

  <input type="text" id="title" placeholder="Haber Başlığı">

  <textarea id="content" placeholder="Haber İçeriği"></textarea>

  <input type="text" id="image" placeholder="Resim URL">

  <select id="category">
    <option value="manset">Manşet</option>
    <option value="ekonomi">Ekonomi</option>
    <option value="spor">Spor</option>
    <option value="magazin">Magazin</option>
    <option value="asayis">Asayiş</option>
    <option value="dunya">Dünya</option>
    <option value="guncel">Güncel</option>
  </select>

  <button onclick="addNews()">Haberi Yayınla</button>

  <div class="info">
    Eklenen haberler tarayıcı hafızasında saklanır.
  </div>

</div>

<script>

function login(){

  let pass = document.getElementById("password").value;

  if(pass === "EtH2026!#News"){

    document.getElementById("loginBox").style.display = "none";

    document.getElementById("panel").style.display = "block";

  }else{

    alert("Şifre yanlış");

  }

}

function addNews(){

  let title = document.getElementById("title").value;
  let content = document.getElementById("content").value;
  let image = document.getElementById("image").value;
  let category = document.getElementById("category").value;

  if(title === "" || content === ""){

    alert("Boş alan bırakma");

    return;

  }

  let news = JSON.parse(localStorage.getItem("news") || "[]");

  news.unshift({
    title,
    content,
    image,
    category
  });

  localStorage.setItem("news", JSON.stringify(news));

  alert("Haber başarıyla eklendi!");

}

</script>

</body>
</html>
